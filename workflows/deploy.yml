name: Build and Upload React App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build

      - name: Archive Build
        run: tar -czf build.tar.gz build

      - name: Upload Build to Platform
        run: |
          curl -X POST https://your-backend.com/deploy/upload \
          -H "Authorization: Bearer ${{ secrets.DEPLOY_SECRET }}" \
          -F "artifact=@build.tar.gz" \
          -F "repo=${{ github.repository }}" \
          -F "commit=${{ github.sha }}"