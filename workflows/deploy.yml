name: Build and Upload React App

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build (defaults to main)'
        required: false
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build

      - name: Verify Build Output
        run: |
          if [ ! -d "build" ]; then
            echo "ERROR: Build directory not found"
            exit 1
          fi
          echo "SUCCESS: Build directory verified"
          ls -lah build/ | head -10

      - name: Archive Build
        run: |
          tar -czf build.tar.gz build/
          echo "Archive created: $(ls -lh build.tar.gz | awk '{print $5}')"

      - name: Upload Build to Platform
        run: |
          RESPONSE=$(curl -X POST "${{ secrets.DEPLOY_BACKEND_URL }}/deploy/upload" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_SECRET }}" \
            -F "artifact=@build.tar.gz" \
            -F "repo=${{ github.repository }}" \
            -F "commit=${{ github.sha }}" \
            -w "\n%{http_code}" \
            -s)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "Upload response code: $HTTP_CODE"
          echo "Response body: $BODY"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi
          
          echo "SUCCESS: Deployment queued"